defaults:
# important to put _self_ first! (otherwise last)
  - _self_ # The _self_ entry determines the relative position of *this* config in the Defaults List.
  - datasets
  - variables
  - periods
  - plots@plots.soi: soi
  - plots@plots.global_mean: global_mean
  - plots@plots.anomalies: anomalies
  - plots@plots.bias_map: bias_map
  - plots@plots.individual_plots: individual_plots

# which plots to produce (must be names of REGISTRY in main.py)
run_plots: ["global_mean", "anomalies", "bias_map", "soi", "individual_plots"] # options: "global_mean", "anomalies", "bias_map", "soi", "individual_plots"]

# output behaviour
out:
  dir: outputs
  savefig: true
  dpi: 150
  overwrite: ask # options: ask, true, false

# conversion factors (K to deg C, scalar to percent)
# options: applies_to: [era5, model, both], op: [sub, add, mul, div]
# unit refers to the new unit after the conversion
conversions: 
  ta:  {op: "sub", value: 273.15, applies_to: "both", unit: "°C"}
  tas: {op: "sub", value: 273.15, applies_to: "both", unit: "°C"}
  tos: {op: "sub", value: 273.15, applies_to: "era5", unit: "°C"}  
  siconc: {op: "mul", value: 100, applies_to: "era5", unit: "%"}

freq_map:
  monthly: Amon
  daily: day
pattern: 
  monthly: "{var}_Amon_{modelname}_aimip_r*i1p1f1_gn_*.nc"
  daily:   "{var}_day_{modelname}_aimip_r*i1p1f1_gn_*.nc"

members: ["member1","member2","member3","member4","member5"] 

print_config: false

#### The following parameters are only relevant for calculating the statistics. All scripts, other than range_summary.py will ignore it. ####
range_summary:
  models_to_process: ["free_run_control","free_run_prediction","forced_sst","forced_sst_2k","forced_sst_4k","archesweather"]
  tag: ""
