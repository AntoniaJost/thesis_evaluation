variable: [hus, psl, siconc, ta, tas, tos, ua, uas, va, vas, wap, zg] # options: [hus, psl, siconc, ta, tas, tos, ua, uas, va, vas, wap, zg] (one or multiple)
# if more than 1 variable is selected that contain pressure levels, plev selection will be applied to all
plev: [5000, 10000, 15000, 20000, 25000, 30000, 40000, 50000, 60000, 70000, 85000, 92500, 100000] # options: null, [5000, 10000, 15000, 20000, 25000, 30000, 40000, 50000, 60000, 70000, 85000, 92500, 100000] (Pa, but code also understands inputs in hPa)
freq: monthly # options: monthly or daily (for daily: ERA5 ref data is currently still missing)
grid: gn # only supports gn
models: ["free_run_control", "free_run_prediction", "forced_sst", "forced_sst_2k", "forced_sst_4k", "archesweather"] # options: ["free_run_control", "free_run_prediction", "forced_sst", "forced_sst_2k", "forced_sst_4k", "archesweather"]
time:
  use_named: null # options: TRP (training period) or TSTP (testing period) or null and set manually
  start: "1979-01-01"
  end: "2024-12-31"

include_ensemble_mean_as_member: true

title: null # example: "{long_name} ({var}) {time_stat}: {proper_model_name} vs ERA5\n({start} - {end})"

coastline_colour: black # default: black
cmap_model: bwr # default: RdBu_r
target_bins: 20 # into how many bins the colourbar is split
set_size_of_bins: null # options: any int or null; determines the size of every bin (in the unit of the trend of the var per decade)
ticks_everyX_model: 1 # ticks every x-th bin
ticks_everyX_diff: 2 # recommendation: greater number for difference as the colourbar is shorter; the code will count the first tick beyond white as the first one and from there on move symmetrically to both sides. If the colourbar only shows one neg/pos bin and ticks_everyX is > 1, you will not get a tick for that one bin
keep_0_tick_model: true # whether to have a tick at 0
keep_0_tick_diff: false # recommend leaving false for diff plot
cmap_diff: BrBG # default: RdBu_r
target_bins_diff: 20
set_size_of_bins_diff: null
global_centre: 0 # only relevant if location=global, longitude that is in centre (0≈Africa, 180≈pacific ocean)

figscale_col: 3.8
figscale_row: 2.8

cbar_label_model: null # e.g. "Field"; if null: uses var
cbar_label_diff: "Model - ERA5"

add_numbers: true # calcs global RMSE and difference

detrend:
  enabled: false
  base_period: unique # options: total or unique (if unique, please set start and end)
  # only relevant for base_period: unique, otherwise ignored
  base_start: "1981-01-01"
  base_end: "2010-12-31"
  preserve_mean: true  # set to true if method = map, otherwise colours will be off

special_outdir: null # options: string after outputs/individual_plots/{method}/{var} or null

range_source:
  suffix: "_ALL" # options: _ALL, _FRc+FR15, _sst0+AW, _sst0+AW+FRc+FR15, _sst0+AW+sst2+sst4, _sst2+sst4
  csv_file1: "outputs/range_summary/range_summary_compact${.suffix}.csv"
  csv_file2: "outputs/range_summary/model_minus_era5_summary_by_var_plev${.suffix}.csv"
  percentile: 99 # options: 99, 95, raw; impacts the selection of the min/max values of the colourbar (e.g. 95 uses the 5th and 95th percentile and therefore includes less extremes than option 99 or even less then option "raw")


##############
# needed because we are reusing existing functions that were written for other purposes and expect these. Do not change.
time_stat: raw
anomaly: false
location: global
difference: false
################
