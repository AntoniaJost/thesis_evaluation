# config/plots/global_mean.yaml
variable: tas
freq: monthly
grid: gn
models: ["forced_sst", "forced_sst_2k", "forced_sst_4k"] #["free_run_control", "free_run_prediction", 
time:
  use_named: null
  start: "1979-01-01"
  end: "2024-12-31"

figsize: [11, 5]
title: "Global Annual Mean Surface Temperature, variable={var}"

show_era5_offset_trends: true

# unit_out: "°C"

ticks:
  major: 5
  minor: 1

angle: 4 # angle of the "ERA5 trend +xK" label

legend:
  loc: "lower right"

# colour-blind / red-green blind friendly colours
colours:
  base_colours:
    forced_sst:      "#0072B2"  # blue
    forced_sst_2k:   "#E69F00"  # orange
    forced_sst_4k:   "#009E73"  # green
    free_run_control: "#D55E00"  # vermillion
    free_run_prediction: "#CC79A7"  # purple

  colours_light:
    forced_sst:      "#56B4E9"
    forced_sst_2k:   "#F0E442"
    forced_sst_4k:   "#7ED1B2"
    free_run_control: "#F4A582"
    free_run_prediction: "#E7B7D4"
